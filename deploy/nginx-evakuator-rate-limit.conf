map $http_user_agent $evac_trusted_bot {
    default 0;
    ~*(YandexMetrika|YaDirectFetcher|YandexBot|YandexUserproxy|yabs|Googlebot) 1;
}

map "$args:$evac_trusted_bot" $evac_ad_limit_key {
    default "";
    ~*(^|&)(yclid|utm_[^=]*|openstat|etext|gclid|fbclid)=.*:0$ $binary_remote_addr;
}

map $uri $evac_home_limit_key {
    default "";
    =/ $binary_remote_addr;
    =/index.html $binary_remote_addr;
}

map $request_uri $evac_scan_limit_key {
    default "";
    ~*(wp-|wordpress|xmlrpc|phpmyadmin|pma|\.env|/admin|/login|/cgi-bin|boaform|HNAP|vendor|composer|actuator|shell|config|backup|\.php|\.git|server-status|setup|install|manager|solr|owa|autodiscover|geoserver|jmx-console|struts|laravel|debug|think|eval-stdin|pearcmd) $binary_remote_addr;
}

map $request_uri $evac_suspicious_log {
    default 0;
    ~*(^|[?&])(yclid|utm_[^=]*|openstat|etext|gclid|fbclid)= 1;
    ~*(wp-|wordpress|xmlrpc|phpmyadmin|pma|\.env|/admin|/login|/cgi-bin|boaform|HNAP|vendor|composer|actuator|shell|config|backup|\.php|\.git|server-status|setup|install|manager|solr|owa|autodiscover|geoserver|jmx-console|struts|laravel|debug|think|eval-stdin|pearcmd) 1;
}

log_format evac_suspicious
    '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
    'args="$args" yclid="$arg_yclid" utm_source="$arg_utm_source" '
    'openstat="$arg_openstat" etext="$arg_etext" request_time=$request_time';

limit_req_zone $binary_remote_addr zone=evac_html:10m rate=5r/s;
limit_req_zone $evac_home_limit_key zone=evac_home:10m rate=30r/m;
limit_req_zone $evac_ad_limit_key zone=evac_ad:10m rate=4r/m;
limit_req_zone $evac_scan_limit_key zone=evac_scan:10m rate=6r/m;
limit_conn_zone $binary_remote_addr zone=evac_conn:10m;
