server {
    server_name evacuatordon.ru www.evacuatordon.ru 194.55.236.121 _;

    root /var/www/evakuator-site;
    index index.html;

    access_log /var/log/nginx/evakuator-site.access.log;
    access_log /var/log/nginx/evakuator-site.suspicious.log evac_suspicious if=$evac_suspicious_log;
    error_log /var/log/nginx/evakuator-site.error.log;

    limit_conn evac_conn 20;

    location / {
        limit_req zone=evac_html burst=30 nodelay;
        limit_req zone=evac_home burst=20 nodelay;
        limit_req zone=evac_ad burst=4 nodelay;
        limit_req zone=evac_scan burst=6 nodelay;
        try_files $uri $uri/ =404;
    }

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/evacuatordon.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/evacuatordon.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.evacuatordon.ru) {
        return 301 https://$host$request_uri;
    }

    if ($host = evacuatordon.ru) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name evacuatordon.ru www.evacuatordon.ru 194.55.236.121 _;
    return 404;
}
