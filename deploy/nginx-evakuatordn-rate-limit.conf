limit_req_status 429;
limit_conn_status 429;

map $http_user_agent $evdn_trusted_bot {
    default 0;
    ~*(YandexMetrika|YaDirectFetcher|YandexBot|YandexUserproxy|yabs|Googlebot) 1;
}

map "$args:$evdn_trusted_bot" $evdn_ad_limit_key {
    default "";
    ~*(^|&)(yclid|utm_[^=]*|openstat|etext|gclid|fbclid)=.*:0$ $binary_remote_addr;
}

map $http_user_agent $evdn_bad_device_fingerprint {
    default 0;
    ~*SM-F731N.*YaSearchBrowser/26\.44\.1.*YaSearchApp/26\.44\.1 1;
}

map "$args:$evdn_trusted_bot" $evdn_paid_ad_landing {
    default 0;
    ~*(^|&)(yclid|etext)=.*:0$ 1;
}

map "$evdn_bad_device_fingerprint:$evdn_paid_ad_landing" $evdn_block_bad_paid_click {
    default 0;
    "1:1" 1;
}

map $uri $evdn_home_limit_key {
    default "";
    =/ $binary_remote_addr;
    =/index.html $binary_remote_addr;
}

map $args $evdn_suspicious_log {
    default 0;
    ~*(^|&)(yclid|utm_[^=]*|openstat|etext|gclid|fbclid)= 1;
}

map "$evdn_suspicious_log:$evdn_block_bad_paid_click" $evdn_security_log {
    default 0;
    ~1 1;
}

log_format evdn_suspicious
    '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
    'args="$args" yclid="$arg_yclid" utm_source="$arg_utm_source" '
    'openstat="$arg_openstat" etext="$arg_etext" '
    'bad_device="$evdn_bad_device_fingerprint" '
    'bad_paid_click="$evdn_block_bad_paid_click" '
    'request_time=$request_time';

limit_req_zone $binary_remote_addr zone=evdn_html:10m rate=5r/s;
limit_req_zone $evdn_home_limit_key zone=evdn_home:10m rate=30r/m;
limit_req_zone $evdn_ad_limit_key zone=evdn_ad:10m rate=4r/m;
limit_conn_zone $binary_remote_addr zone=evdn_conn:10m;
