server {
    server_name evakuatordn.ru www.evakuatordn.ru;

    root /var/www/evakuatordn-site;
    index index.html;
    charset utf-8;

    access_log /var/log/nginx/evakuatordn-site.access.log;
    access_log /var/log/nginx/evakuatordn-site.suspicious.log evdn_suspicious if=$evdn_security_log;
    error_log /var/log/nginx/evakuatordn-site.error.log;

    include /etc/nginx/snippets/evakuatordn-blocked-ips.conf;

    limit_conn evdn_conn 20;

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location = /sitemap.xml {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|webp|ico|woff2?|webmanifest|xml)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location / {
        if ($evdn_block_bad_paid_click) {
            return 403;
        }

        limit_req zone=evdn_html burst=30 nodelay;
        limit_req zone=evdn_home burst=20 nodelay;
        limit_req zone=evdn_ad burst=4 nodelay;
        try_files $uri $uri/ =404;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/evakuatordn.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/evakuatordn.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name evakuatordn.ru www.evakuatordn.ru;
    include /etc/nginx/snippets/evakuatordn-blocked-ips.conf;
    return 301 https://$host$request_uri;
}
